# Example: Vault Agent sidecar injection
#
# This pod uses Vault annotations to have secrets automatically injected.
# The Vault Agent Injector sees these annotations and adds a sidecar that:
# 1. Authenticates to Vault using the pod's service account
# 2. Fetches the secret at the specified path
# 3. Writes it to /vault/secrets/db-creds in the shared volume
#
# Prerequisites: Run k8s-auth-setup.sh first to create the role and secret.
#
# Apply:  kubectl apply -f platform/vault/config/example-secret-injection.yaml
# Check:  kubectl exec vault-demo -- cat /vault/secrets/db-creds
# Delete: kubectl delete -f platform/vault/config/example-secret-injection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: vault-demo
  namespace: default
  annotations:
    # Tell the injector to inject a sidecar
    vault.hashicorp.com/agent-inject: "true"
    # Which Vault role to authenticate with
    vault.hashicorp.com/role: "demo-app"
    # Inject the secret at this path into a file
    vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/demo/db-creds"
    # Template to format the secret as key=value
    vault.hashicorp.com/agent-inject-template-db-creds: |
      {{- with secret "secret/data/demo/db-creds" -}}
      username={{ .Data.data.username }}
      password={{ .Data.data.password }}
      {{- end }}
spec:
  serviceAccountName: default
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "cat /vault/secrets/db-creds && sleep 3600"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
