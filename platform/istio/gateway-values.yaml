# Istio Ingress Gateway
# Chart: istio/gateway
# The gateway is an Envoy proxy that sits at the edge of the mesh and
# routes external traffic into the cluster based on VirtualService rules.
#
# WHY not just a regular ingress controller?
# The Istio gateway IS an ingress controller, but it also participates
# in the mesh. This means incoming traffic gets the same mTLS, traffic
# splitting, fault injection, and observability as internal traffic.
#
# HOW traffic reaches the gateway on kind:
# kind maps localhost:30080 → control-plane container:30080 (NodePort).
# The gateway Service uses NodePort 30080/30443 to receive external traffic.

# Run on the control-plane node which has the kind port mappings
nodeSelector:
  ingress-ready: "true"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

service:
  type: NodePort
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 80
      protocol: TCP
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
      nodePort: 30443

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
