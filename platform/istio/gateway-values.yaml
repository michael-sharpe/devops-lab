# Istio Ingress Gateway
# Chart: istio/gateway
# The gateway is an Envoy proxy that sits at the edge of the mesh and
# routes external traffic into the cluster based on VirtualService rules.
#
# WHY not just a regular ingress controller?
# The Istio gateway IS an ingress controller, but it also participates
# in the mesh. This means incoming traffic gets the same mTLS, traffic
# splitting, fault injection, and observability as internal traffic.

# Run on the control-plane node which has the port mappings
# (ports 80/443 mapped from localhost into the kind cluster).
nodeSelector:
  ingress-ready: "true"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

service:
  # Use NodePort to work with kind's extraPortMappings.
  # Traffic flow: localhost:80 → kind container:80 → gateway pod:80
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
      protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
