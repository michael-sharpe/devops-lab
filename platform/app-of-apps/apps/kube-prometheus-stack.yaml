# kube-prometheus-stack — Prometheus + Grafana + AlertManager
#
# WHY this is deployed first in the observability phase:
# Prometheus is the foundation. Every other tool (Tempo, OTel Collector,
# Istio, Falco) exports metrics TO Prometheus. Grafana visualizes them.
# Without this, you're flying blind.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    phase: "3"
    component: observability
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 83.0.2
      helm:
        valueFiles:
          - $values/platform/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/michael-sharpe/devops-lab.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  # Ignore fields in live resources that ArgoCD's schema doesn't know about.
  # The .status.terminatingReplicas field was added to StatefulSet in K8s 1.31+
  # but ArgoCD's bundled schema doesn't include it yet, causing diff failures.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
      managedFieldsManagers:
        - kube-controller-manager
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .status.terminatingReplicas
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .status.terminatingReplicas
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply required — kube-prometheus-stack creates large CRDs
      # that exceed the annotation size limit for client-side apply
      - ServerSideApply=true
      # ServerSideDiff uses the API server's schema for diffing instead of
      # ArgoCD's client-side schema. Fixes "field not declared in schema"
      # errors when CRDs have fields newer than ArgoCD knows about.
      - ServerSideDiff=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
