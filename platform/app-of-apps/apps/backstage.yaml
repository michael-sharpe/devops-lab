# Backstage — developer portal and service catalog
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  labels:
    phase: "7"
    component: advanced
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://backstage.github.io/charts
      chart: backstage
      targetRevision: 2.6.3
      helm:
        valueFiles:
          - $values/platform/backstage/values.yaml
    - repoURL: https://github.com/michael-sharpe/devops-lab.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: backstage

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .status.terminatingReplicas
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .status.terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
