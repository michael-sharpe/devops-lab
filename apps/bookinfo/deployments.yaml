# Bookinfo — Istio's classic demo application
# Four microservices that form a book review website:
#   productpage → details + reviews
#   reviews (v1) → no ratings
#   reviews (v2) → ratings (black stars)
#   reviews (v3) → ratings (red stars)
#
# WHY this app? It demonstrates:
# - Service-to-service communication through the mesh
# - Multiple versions of a service (for traffic splitting)
# - Distributed tracing across services
# - mTLS encryption between all services
---
# --- productpage ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpage-v1
  namespace: bookinfo
  labels:
    app: productpage
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productpage
      version: v1
  template:
    metadata:
      labels:
        app: productpage
        version: v1
    spec:
      containers:
        - name: productpage
          image: docker.io/istio/examples-bookinfo-productpage-v1:1.20.2
          ports:
            - containerPort: 9080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: productpage
  namespace: bookinfo
  labels:
    app: productpage
spec:
  ports:
    - port: 9080
      name: http
  selector:
    app: productpage
