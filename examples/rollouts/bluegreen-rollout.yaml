# Blue-Green Rollout — instant switch with preview
#
# WHY blue-green? The new version (green) is deployed alongside the
# current version (blue). You can preview and test green before
# switching traffic. The switch is instant (not gradual like canary).
# If something is wrong, you switch back immediately.
#
# Apply: kubectl apply -f examples/rollouts/bluegreen-rollout.yaml
# Watch: kubectl argo rollouts get rollout demo-app-bg -n demo -w
# Promote: kubectl argo rollouts promote demo-app-bg -n demo
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app-bg
  namespace: demo
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: demo-app-bg
  strategy:
    blueGreen:
      activeService: demo-app-bg-active
      previewService: demo-app-bg-preview
      # Don't auto-promote — require manual approval
      autoPromotionEnabled: false
  template:
    metadata:
      labels:
        app: demo-app-bg
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-bg-active
  namespace: demo
spec:
  selector:
    app: demo-app-bg
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-bg-preview
  namespace: demo
spec:
  selector:
    app: demo-app-bg
  ports:
    - port: 80
