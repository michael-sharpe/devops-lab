# AnalysisTemplate — automated success rate check during rollouts
#
# WHY? This queries Prometheus for the success rate of the canary.
# If it drops below 95%, Rollouts automatically aborts and rolls back.
# This closes the loop: deploy → monitor → auto-rollback if bad.
#
# Integrates: Phase 3 (Prometheus) + Phase 4 (Istio metrics) + Phase 7 (Rollouts)
#
# Apply: kubectl apply -f examples/rollouts/analysis-template.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: demo
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      # Check every 30 seconds
      interval: 30s
      # Must be >= 95% to pass
      successCondition: result[0] >= 0.95
      # Fail after 3 consecutive failures
      failureLimit: 3
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            sum(rate(
              istio_requests_total{
                destination_service_name="{{args.service-name}}",
                response_code!~"5.*"
              }[2m]
            )) /
            sum(rate(
              istio_requests_total{
                destination_service_name="{{args.service-name}}"
              }[2m]
            ))
