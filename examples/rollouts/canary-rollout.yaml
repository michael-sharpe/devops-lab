# Canary Rollout — gradually shift traffic to a new version
#
# WHY canary? Instead of deploying a new version to all users at once,
# you start with a small percentage (20%) and increase it step by step.
# If metrics degrade, Rollouts automatically rolls back. This is the
# safest way to deploy changes.
#
# This integrates three phases:
# - Phase 4 (Istio): VirtualService controls traffic weight
# - Phase 3 (Prometheus): AnalysisTemplate queries success rate
# - Phase 7 (Rollouts): orchestrates the whole process
#
# Apply: kubectl apply -f examples/rollouts/canary-rollout.yaml
# Watch: kubectl argo rollouts get rollout demo-app -n demo -w
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: demo
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: demo-app
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 40
        - pause: {duration: 30s}
        - setWeight: 60
        - pause: {duration: 30s}
        - setWeight: 80
        - pause: {duration: 30s}
      canaryService: demo-app-canary
      stableService: demo-app-stable
      trafficRouting:
        istio:
          virtualServices:
            - name: demo-app-vsvc
              routes:
                - primary
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: app
          # Change this image tag to trigger a rollout
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-stable
  namespace: demo
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-canary
  namespace: demo
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: demo-app-vsvc
  namespace: demo
spec:
  hosts:
    - demo-app
  http:
    - name: primary
      route:
        - destination:
            host: demo-app-stable
          weight: 100
        - destination:
            host: demo-app-canary
          weight: 0
