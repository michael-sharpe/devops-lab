# Chaos Engineering Workflow — Argo Workflows + Chaos Mesh
#
# Demonstrates automated chaos testing:
# 1. Verify app is healthy
# 2. Inject chaos (pod kill)
# 3. Wait for recovery
# 4. Verify app recovered
#
# Prerequisites: Chaos Mesh installed, bookinfo app running
#
# Apply: kubectl apply -f examples/workflows/chaos-workflow.yaml -n argo
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: chaos-test
  namespace: argo
spec:
  entrypoint: chaos-pipeline
  templates:
    - name: chaos-pipeline
      steps:
        - - name: pre-check
            template: health-check
        - - name: inject-chaos
            template: inject-chaos
        - - name: wait-recovery
            template: wait
        - - name: post-check
            template: health-check

    - name: health-check
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            echo "=== Checking bookinfo health ==="
            kubectl get pods -n bookinfo -o wide
            READY=$(kubectl get pods -n bookinfo -l app=productpage -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}')
            echo "Productpage ready: $READY"
            if [ "$READY" != "True" ]; then
              echo "FAIL: productpage is not ready"
              exit 1
            fi
            echo "=== Health check passed ==="
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi

    - name: inject-chaos
      container:
        image: busybox:1.36
        command: [sh, -c]
        args:
          - |
            echo "=== Chaos injection ==="
            echo "In a full setup, this would create a PodChaos CR"
            echo "to kill a bookinfo pod and test resilience."
            echo "See examples/chaos/pod-kill.yaml for the actual CR."
            echo "=== Chaos injected ==="
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 32Mi

    - name: wait
      container:
        image: busybox:1.36
        command: [sh, -c, "echo 'Waiting 30s for recovery...' && sleep 30"]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 32Mi
