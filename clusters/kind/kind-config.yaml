# Kind cluster configuration for the DevOps Learning Lab
# Docs: https://kind.sigs.k8s.io/docs/user/configuration/
#
# WHY multi-node?
# A single-node cluster hides real-world concerns: scheduling decisions,
# node affinity, taints/tolerations, rolling updates, and node failure.
# Three workers is the minimum to demonstrate all of these.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devops-lab

networking:
  # Default CNI (kindnet). In production you might use Calico or Cilium.
  # Can be switched by setting disableDefaultCNI: true and installing via ArgoCD.
  disableDefaultCNI: false
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"

nodes:
  # --- Control Plane ---
  # WHY extraPortMappings: kind runs inside Docker, so cluster ports aren't
  # accessible from the host by default. These mappings route localhost traffic
  # into the cluster — required for ingress (80/443) and ArgoCD UI (30080/30443).
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP — Istio ingress gateway (Phase 4)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS — Istio ingress gateway (Phase 4)
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # NodePort — ArgoCD HTTP (Phase 2, before ingress exists)
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # NodePort — ArgoCD HTTPS (Phase 2, before ingress exists)
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP

  # --- Worker 1: Infrastructure ---
  # WHY separate infra node: In production, platform tools (monitoring, ingress,
  # CI runners) run on dedicated nodes to isolate them from application workloads.
  # Use nodeSelector: { node-role: infra } to target this node.
  - role: worker
    labels:
      node-role: infra
      tier: platform

  # --- Worker 2: Application ---
  - role: worker
    labels:
      node-role: app
      tier: application

  # --- Worker 3: Application ---
  # WHY two app nodes: Allows demonstrating pod anti-affinity (spread replicas
  # across nodes) and rolling updates where at least one replica stays available.
  - role: worker
    labels:
      node-role: app
      tier: application
